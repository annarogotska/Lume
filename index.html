<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nuvel — Design at the speed of thought</title>

<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<meta name="theme-color" content="#0a0a12" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script>
/* Add .play only when the document is actually visible, so entrance
   animations never leave content stuck hidden in a backgrounded tab,
   print, or PDF export. Resting state (no .play) is fully visible. */
(function () {
  var d = document.documentElement;
  function play() {
    if (document.visibilityState === "visible") {
      d.classList.add("play");
      document.removeEventListener("visibilitychange", play);
    }
  }
  play();
  document.addEventListener("visibilitychange", play);
})();
</script>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
